name: Rust

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: 1G
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/synapse-core

jobs:
  commit-lint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate conventional commit format
        run: |
          # Fetch the base branch so we can compare commits
          git fetch origin ${{ github.base_ref }}

          # Get all commit messages in this PR
          COMMITS=$(git log --pretty=format:"%s" origin/${{ github.base_ref }}..HEAD)

          echo "Validating commit messages:"
          echo "$COMMITS"

          # Conventional commit pattern:
          # type(optional-scope): description
          # Valid types: feat, fix, perf, refactor, docs, test, chore, ci, build, revert, merge
          PATTERN="^(feat|fix|perf|refactor|docs|test|chore|ci|build|revert|merge)(\(.+\))?(!)?: .{1,100}"

          FAILED=0
          while IFS= read -r commit; do
            # Skip empty lines and merge commits
            if [ -z "$commit" ] || echo "$commit" | grep -qE "^Merge (branch|pull request)"; then
              continue
            fi
            if ! echo "$commit" | grep -qE "$PATTERN"; then
              echo "❌ Invalid commit message: '$commit'"
              echo "   Expected format: type(scope): description"
              echo "   Valid types: feat, fix, perf, refactor, docs, test, chore, ci, build, revert"
              FAILED=1
            else
              echo "✅ Valid: '$commit'"
            fi
          done <<< "$COMMITS"

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "One or more commit messages do not follow the Conventional Commits specification."
            echo "See: https://www.conventionalcommits.org/"
            exit 1
          fi

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin git-cliff-2.4.0-x86_64-unknown-linux-gnu/git-cliff

      - name: Generate CHANGELOG.md
        run: git-cliff --output CHANGELOG.md

      - name: Commit updated changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "chore: update CHANGELOG.md [skip ci]"
            git push
          else
            echo "No changelog changes to commit."
          fi

  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: clippy, rustfmt

    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Install sqlx-cli
      run: cargo install sqlx-cli --no-default-features --features postgres

    - name: Start sccache
      run: sccache --start-server

    - name: Run migrations
      run: sqlx migrate run
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test

    - name: Run clippy
      run: cargo clippy -- -D warnings
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test

    - name: Build
      run: cargo build --verbose
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test

    - name: Run tests
      run: cargo test --verbose
      env:
        DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_test

    - name: Extract Cargo package version
      id: extract-version
      run: |
        VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v5
      with:
        registry: ghcr.io
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./dockerfile
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Stop sccache
      run: sccache --stop-server
